name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  # Eval gates run on any change touching prompts, validators, or packs.
  # Gates: zero clue leaks on the probe set, pack-quality checks green.
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            gated:
              - 'server/prompts/**'
              - 'server/audit.py'
              - 'server/validators.py'
              - 'content-factory/**'
              - 'evals/**'
      - uses: actions/setup-python@v5
        if: steps.changes.outputs.gated == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
        if: steps.changes.outputs.gated == 'true'
      - run: pytest evals --override-ini testpaths=evals
        if: steps.changes.outputs.gated == 'true'
