<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" width="1240" height="760"
     font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img"
     aria-label="Blindspot architecture diagram">
  <defs>
    <marker id="ar-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4FB8A8"/>
    </marker>
    <marker id="ar-bone" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa0ab"/>
    </marker>
    <marker id="ar-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8B7FD4"/>
    </marker>
    <marker id="ar-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E8A33D"/>
    </marker>
  </defs>

  <rect width="1240" height="760" rx="16" fill="#131A26"/>
  <rect x="0" y="0" width="1240" height="5" fill="#4FB8A8">
    <animate attributeName="fill" values="#4FB8A8;#E8A33D;#D14B57;#8B7FD4;#4FB8A8" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Band labels -->
  <text x="40" y="48" font-size="15" letter-spacing="3" fill="#4FB8A8">LIVE GAME (SERVER AUTHORITATIVE)</text>
  <line x1="40" y1="430" x2="1200" y2="430" stroke="#E9E4D8" stroke-opacity="0.10" stroke-width="1"/>
  <text x="40" y="470" font-size="15" letter-spacing="3" fill="#8B7FD4">OFFLINE AND CI</text>

  <!-- Players -->
  <g>
    <rect x="40" y="120" width="230" height="150" rx="14" fill="#1B2433" stroke="#E9E4D8" stroke-opacity="0.12"/>
    <text x="60" y="158" font-size="20" font-weight="700" fill="#E9E4D8">Players</text>
    <text x="60" y="190" font-size="14" fill="#E9E4D8" opacity="0.7">web/  Next.js on phones</text>
    <text x="60" y="214" font-size="14" fill="#E9E4D8" opacity="0.7">renders broadcast state</text>
    <text x="60" y="238" font-size="14" fill="#E9E4D8" opacity="0.7">zero game logic or secrets</text>
  </g>

  <!-- Server -->
  <rect x="410" y="70" width="470" height="320" rx="16" fill="#161E2B" stroke="#E9E4D8" stroke-opacity="0.12"/>
  <text x="432" y="100" font-size="15" letter-spacing="2" fill="#E9E4D8" opacity="0.6">server/  FastAPI</text>

  <rect x="432" y="115" width="426" height="56" rx="10" fill="#1B2433" stroke="#4FB8A8" stroke-opacity="0.5"/>
  <text x="452" y="140" font-size="16" font-weight="600" fill="#E9E4D8">WebSocket handlers</text>
  <text x="452" y="160" font-size="13" fill="#E9E4D8" opacity="0.65">resume the graph, never mutate state</text>

  <rect x="432" y="183" width="426" height="86" rx="10" fill="#1B2433" stroke="#E8A33D" stroke-opacity="0.6"/>
  <text x="452" y="209" font-size="16" font-weight="600" fill="#E9E4D8">LangGraph engine</text>
  <text x="452" y="230" font-size="13" fill="#E9E4D8" opacity="0.7">one graph per room, thread_id = room code</text>
  <text x="452" y="250" font-size="13" fill="#E9E4D8" opacity="0.7">interrupt() is the turn; single writer to state</text>

  <rect x="432" y="281" width="426" height="86" rx="10" fill="#1B2433" stroke="#D14B57" stroke-opacity="0.6"/>
  <text x="452" y="307" font-size="16" font-weight="600" fill="#E9E4D8">AI seats</text>
  <text x="452" y="328" font-size="13" fill="#E9E4D8" opacity="0.7">clue agent, fail-closed audit, suspicion vote</text>
  <text x="452" y="348" font-size="13" fill="#E9E4D8" opacity="0.7">LLM proposes, Python verifies before state</text>

  <!-- Postgres -->
  <g>
    <rect x="980" y="120" width="220" height="150" rx="14" fill="#1B2433" stroke="#E9E4D8" stroke-opacity="0.12"/>
    <text x="1000" y="158" font-size="20" font-weight="700" fill="#E9E4D8">Postgres</text>
    <text x="1000" y="190" font-size="13" fill="#E9E4D8" opacity="0.7">graph checkpoints</text>
    <text x="1000" y="212" font-size="13" fill="#E9E4D8" opacity="0.7">rooms, players</text>
    <text x="1000" y="234" font-size="13" fill="#E9E4D8" opacity="0.7">telemetry, packs</text>
  </g>

  <!-- Players -> Server: Command(resume) -->
  <path d="M270 165 H 410" fill="none" stroke="#4FB8A8" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#ar-teal)">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="278" y="155" font-size="12.5" fill="#4FB8A8">Command(resume=event)</text>

  <!-- Server -> Players: phase_state broadcast -->
  <path d="M410 225 H 270" fill="none" stroke="#9aa0ab" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#ar-bone)">
    <animate attributeName="stroke-dashoffset" values="0;32" dur="1.1s" repeatCount="indefinite"/>
  </path>
  <text x="278" y="247" font-size="12.5" fill="#9aa0ab">phase_state broadcast (per player)</text>

  <!-- Engine -> Postgres: checkpoint -->
  <path d="M880 200 H 980" fill="none" stroke="#4FB8A8" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#ar-teal)">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="1s" repeatCount="indefinite"/>
  </path>
  <text x="876" y="190" font-size="12.5" fill="#4FB8A8">checkpoint, reconnect = reload</text>

  <!-- Content factory -->
  <g>
    <rect x="40" y="500" width="380" height="170" rx="14" fill="#1B2433" stroke="#E9E4D8" stroke-opacity="0.12"/>
    <text x="60" y="538" font-size="19" font-weight="700" fill="#E9E4D8">content-factory</text>
    <text x="60" y="568" font-size="14" fill="#E9E4D8" opacity="0.7">offline LangGraph batch</text>
    <text x="60" y="592" font-size="14" fill="#E9E4D8" opacity="0.7">propose, verify, calibrate</text>
    <text x="60" y="616" font-size="14" fill="#E9E4D8" opacity="0.7">writes versioned, unshipped packs</text>
  </g>
  <!-- factory -> postgres (routed up the right edge) -->
  <path d="M420 560 H 1090 V 270" fill="none" stroke="#8B7FD4" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#ar-violet)">
    <animate attributeName="stroke-dashoffset" values="48;0" dur="1.4s" repeatCount="indefinite"/>
  </path>
  <text x="700" y="552" font-size="12.5" fill="#8B7FD4">versioned packs</text>

  <!-- evals -->
  <g>
    <rect x="470" y="500" width="360" height="170" rx="14" fill="#1B2433" stroke="#E9E4D8" stroke-opacity="0.12"/>
    <text x="490" y="538" font-size="19" font-weight="700" fill="#E9E4D8">evals  (CI gates)</text>
    <text x="490" y="568" font-size="14" fill="#E9E4D8" opacity="0.7">clue-leak suite: zero leaks</text>
    <text x="490" y="592" font-size="14" fill="#E9E4D8" opacity="0.7">pack-quality suite: green</text>
    <text x="490" y="616" font-size="14" fill="#E9E4D8" opacity="0.7">a pack ships only if these pass</text>
  </g>

  <!-- LLM providers -->
  <g>
    <rect x="880" y="500" width="320" height="170" rx="14" fill="#1B2433" stroke="#E9E4D8" stroke-opacity="0.12"/>
    <text x="900" y="538" font-size="19" font-weight="700" fill="#E9E4D8">Model providers</text>
    <text x="900" y="568" font-size="14" fill="#E9E4D8" opacity="0.7">Anthropic: clue generation</text>
    <text x="900" y="592" font-size="14" fill="#E9E4D8" opacity="0.7">OpenAI: audit + vote embeddings</text>
    <text x="900" y="616" font-size="14" fill="#E9E4D8" opacity="0.7">behind a thin, mockable seam</text>
  </g>
  <!-- AI seats -> providers -->
  <path d="M760 367 V 500" fill="none" stroke="#E8A33D" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#ar-amber)">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="1.05s" repeatCount="indefinite"/>
  </path>
  <text x="772" y="445" font-size="12.5" fill="#E8A33D">propose, then verify</text>
</svg>
